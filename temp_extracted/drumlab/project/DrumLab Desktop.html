<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DrumLab — Desktop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #050505;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
      color: #f5f5f7;
      overflow: hidden;
    }
    #root {
      display: flex; align-items: center; justify-content: center;
      width: 100vw; height: 100vh;
    }
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 8px; }
    *::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }
    button { font-family: inherit; }
    input { font-family: inherit; }
    /* Range styling */
    input[type="range"] { height: 4px; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- macOS window chrome (we only use MacTrafficLights) -->
  <script type="text/babel" src="drumlab-desktop/macos-window.jsx"></script>

  <!-- Icons + illustrations (shared with mobile) -->
  <script type="text/babel" src="drumlab/icons.jsx"></script>

  <!-- Desktop-specific shared (tokens, sidebar, coach panel, data) -->
  <script type="text/babel" src="drumlab-desktop/shared.jsx"></script>

  <!-- Views -->
  <script type="text/babel" src="drumlab-desktop/views.jsx"></script>
  <script type="text/babel" src="drumlab-desktop/views2.jsx"></script>

  <!-- App shell -->
  <script type="text/babel" src="drumlab-desktop/app.jsx"></script>
</body>
</html>
