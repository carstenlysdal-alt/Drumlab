<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DrumLab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #050505;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
      color: #f5f5f7;
      overflow: hidden;
    }
    #root {
      display: flex; align-items: center; justify-content: center;
      width: 100vw; height: 100vh;
    }
    .device-scaler { transform-origin: center center; }
    *::-webkit-scrollbar { display: none; }
    * { scrollbar-width: none; }
    button { font-family: inherit; }
    input { font-family: inherit; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="drumlab/ios-frame.jsx"></script>
  <script type="text/babel" src="drumlab/icons.jsx"></script>
  <script type="text/babel" src="drumlab/screens-home.jsx"></script>
  <script type="text/babel" src="drumlab/screens-lessons.jsx"></script>
  <script type="text/babel" src="drumlab/screens-kit.jsx"></script>
  <script type="text/babel" src="drumlab/screens-coach-profile.jsx"></script>
  <script type="text/babel" src="drumlab/app.jsx"></script>
</body>
</html>
